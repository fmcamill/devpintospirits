backend:
  name: git-gateway
  branch: main
  site_domain: pintospirits.netlify.app

media_folder: pinto-cms/assets/images
public_folder: /assets/images

locale: en

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "content"
        label: "Homepage Content"
        file: "pinto-cms/content.json"
        format: json
        fields:

          - label: "🏠 Hero"
            name: "hero"
            widget: "object"
            fields:
              - label: "Background Image"
                name: "bg_image"
                widget: "image"
                required: false
                hint: "Full-width photo behind the hero. Recommended landscape, 1920×1080px minimum."
              - label: "Eyebrow Text"
                name: "eyebrow"
                widget: "string"
                hint: "Small text above the main title"
              - label: "Main Headline"
                name: "headline"
                widget: "string"
              - label: "Subtitle"
                name: "subtitle"
                widget: "text"
              - label: "Button Text"
                name: "cta_text"
                widget: "string"

          - label: "📖 About Section"
            name: "about"
            widget: "object"
            fields:
              - label: "Photo"
                name: "photo"
                widget: "image"
                required: false
                hint: "About section image. Recommended portrait orientation, 800×1000px."
              - label: "Section Heading"
                name: "heading"
                widget: "string"
              - label: "First Paragraph"
                name: "body_1"
                widget: "text"
              - label: "Second Paragraph"
                name: "body_2"
                widget: "text"
              - label: "Pull Quote"
                name: "quote"
                widget: "string"
                hint: "The quote shown below the paragraphs"

          - label: "🥃 Brands"
            name: "brands"
            widget: "object"
            fields:
              - label: "Section Intro Text"
                name: "intro"
                widget: "string"
              - label: "Brand List"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - {label: "Brand Name", name: "name", widget: "string"}
                  - {label: "Category Tag (e.g. Craft Gin)", name: "tag", widget: "string"}
                  - {label: "Tagline", name: "tagline", widget: "string"}
                  - {label: "Story (shown in the pop-up)", name: "story", widget: "text", hint: "Separate paragraphs with a blank line."}
                  - label: "Card Image"
                    name: "image"
                    widget: "image"
                    required: false
                  - label: "Pop-up Gallery Images (up to 4)"
                    name: "gallery"
                    widget: "list"
                    max: 4
                    summary: "Image {{index}}"
                    field: {label: "Image", name: "src", widget: "image"}

          - label: "🖼️ Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - label: "Gallery Images"
                name: "images"
                widget: "list"
                summary: "Image {{index}}"
                field: {label: "Image", name: "src", widget: "image"}

          - label: "✉️ Contact"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Phone Number", name: "phone", widget: "string"}
              - {label: "Instagram URL", name: "ig_url", widget: "string", required: false}

          - label: "⚙️ Settings"
            name: "site"
            widget: "object"
            fields:
              - {label: "Show Journal Section", name: "show_journal", widget: "boolean", default: true, hint: "Toggle the journal section on the homepage and in the navigation"}
